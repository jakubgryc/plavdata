services:
  nginx:
    image: nginx:alpine
    container_name: plavdata_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    environment:
      - SERVER_NAME=${SERVER_NAME:-localhost}
    networks:
      - app-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    command: >
      /bin/sh -c "envsubst '$$SERVER_NAME' < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    container_name: plavdata_certbot
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    depends_on:
      - nginx

  backend:
    build: ./backend
    container_name: plavdata_be
    networks:
      - app-network
    expose:
      - "8000"
    volumes:
      - "./backend/data:/app/data"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENV=production
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: plavdata_fe
    networks:
      - app-network
    expose:
      - "80"
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

