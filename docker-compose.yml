services:
  backend:
    build: ./backend
    container_name: plavdata_be
    networks:
      - app-network
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - "./backend/data:/app/data"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: "sqlite:///${DB_PATH}"
    develop:
      watch:
        - action: sync
          path: ./backend/
          target: /app
          ignore:
            - ./backend/venv/
            - ./backend/data/

        - action: rebuild
          path: ./backend/uv.lock

  frontend:
    build: ./frontend
    container_name: plavdata_fe
    networks:
      - app-network
    ports:
      - "127.0.0.1:3000:5173"
    env_file:
      - ./frontend/.env
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - ./frontend/node_modules/
            - ./frontend/dist/
            - ./frontend/package*.json

        - action: rebuild
          path: ./frontend/package*.json
    command: npm run dev
networks:
  app-network:
    driver: bridge
